server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # Noop — Caddy handles this at the reverse-proxy level.
        # This block exists only to prevent nginx from serving stale /api/ paths.
        return 404;
    }
}
